<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mana Resonance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body class="overflow-hidden select-none bg-[#020306] text-slate-100 font-sans">

  <!-- メインアプリレイアウト -->
  <div class="app-container flex h-screen w-screen overflow-hidden relative">

    <!-- macOSドラッグ用ヘッダー -->
    <header class="title-bar absolute top-0 left-0 right-0 h-8 z-50 pointer-events-auto flex items-center justify-between px-3">
      <div class="window-controls flex space-x-2">
        <button id="btn-close" class="ctrl-btn bg-[#ff5f56] hover:bg-[#ff5f56]/80" title="閉じる"></button>
        <button id="btn-minimize" class="ctrl-btn bg-[#ffbd2e] hover:bg-[#ffbd2e]/80" title="最小化"></button>
        <button id="btn-maximize" class="ctrl-btn bg-[#27c93f] hover:bg-[#27c93f]/80" title="最大化"></button>
      </div>
    </header>

    <!-- 1. Apple Liquid Glass 左サイドナビゲーションバー -->
    <aside class="w-64 liquid-sidebar flex flex-col justify-between p-4 shrink-0 z-40 select-none">
      
      <!-- 上部: ロゴ ＆ ブランド -->
      <div class="space-y-6 pt-4">
        <div class="flex items-center space-x-3 px-2">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-purple-600 via-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-purple-500/25 border border-white/20">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12 0c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
          </div>
          <div>
            <h1 class="text-sm font-black tracking-wider text-white">MANA<span class="text-purple-400">.RESONANCE</span></h1>
            <p class="text-[10px] text-slate-400 font-mono tracking-tight font-bold">STUDIO PRO v1.0.9</p>
          </div>
        </div>

        <!-- ナビゲーション -->
        <nav class="space-y-1.5 font-medium">
          <a href="#" class="nav-item active flex items-center space-x-3 px-3.5 py-2.5 rounded-xl text-xs font-bold text-white bg-purple-600/25 border border-purple-500/40 shadow-lg shadow-purple-900/30">
            <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            <span>Live Analyzer</span>
          </a>
        </nav>
      </div>

      <!-- 中部: 設定カード (オーディオインプットデバイス削除済み) -->
      <div class="space-y-4 my-auto bg-black/40 p-3.5 rounded-2xl border border-white/10 shadow-inner">
        <div class="space-y-1.5">
          <label for="preset-select" class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Filter Preset</label>
          <select id="preset-select" class="w-full bg-[#080c16] border border-white/15 rounded-xl px-2.5 py-1.5 text-xs text-purple-300 font-bold focus:outline-none focus:border-purple-500 transition-colors">
            <option value="flat">フラット (原音重視)</option>
            <option value="vocal" selected>ボーカル強調 (Vocal Boost)</option>
            <option value="bass">重低音強調 (Bass Boost)</option>
            <option value="clear">ノイズ除去・クリア (Noise Cut)</option>
          </select>
        </div>

        <div class="pt-2 border-t border-white/10 space-y-2">
          <!-- BETA UPDATES トグル -->
          <label class="flex items-center justify-between cursor-pointer select-none text-[10px] font-extrabold text-slate-300 bg-[#080c16]/80 p-2 rounded-xl border border-white/10 hover:border-purple-500/40 transition-all">
            <span>BETA UPDATES</span>
            <input type="checkbox" id="beta-update-toggle" class="rounded border-purple-800 text-purple-600 focus:ring-0 bg-black w-3.5 h-3.5 cursor-pointer">
          </label>
        </div>
      </div>

      <!-- 下部: 再接続 ＆ アクションコントロール -->
      <div class="space-y-2.5 pt-2 border-t border-white/10">
        <button id="btn-reconnect" class="w-full flex items-center justify-center space-x-2 bg-purple-600/25 hover:bg-purple-600/35 border border-purple-500/40 text-purple-200 rounded-xl py-2.5 text-xs font-black transition-all shadow-lg shadow-purple-950/40 active:scale-95" title="マイク切り替え等で音が途切れた際のリスタート用">
          <span>🔄</span>
          <span>RECONNECT ENGINE</span>
        </button>

        <div class="flex items-center justify-between text-[10px] text-slate-400 font-mono px-1">
          <span class="font-bold">STATUS:</span>
          <span id="fps-counter" class="text-purple-400 font-black">60 FPS</span>
        </div>
      </div>
    </aside>

    <!-- 2. 右メインダッシュボード領域 -->
    <main class="flex-1 flex flex-col overflow-y-auto p-6 space-y-6 pt-10">

      <!-- ヘッダーアクションバー (ファイルドロップ＆コントロール) (ミュートボタン削除済み) -->
      <section class="liquid-card flex items-center justify-between gap-4 p-3 shrink-0">
        
        <!-- ドラッグ＆ドロップ領域 -->
        <div id="drop-zone" class="flex-1 flex items-center justify-center border-2 border-dashed border-white/15 rounded-xl py-2.5 px-4 hover:border-purple-400 hover:bg-purple-500/10 transition-all text-xs text-slate-300 font-bold cursor-pointer w-full">
          <svg class="w-4 h-4 mr-2 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
          音声 / 動画ファイルをドラッグ＆ドロップして解析
        </div>

        <!-- ファイルプレイヤーコントロール -->
        <div id="file-player-controls" class="hidden flex items-center space-x-3 bg-black/80 px-4 py-2 rounded-xl border border-white/15 shrink-0">
          <span id="file-name" class="text-xs font-bold text-purple-300 max-w-[140px] truncate">No File</span>
          
          <div class="flex items-center space-x-2">
            <button id="btn-play-pause" class="bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-3 py-1 text-xs font-bold select-none transition-all">再生</button>
            <button id="btn-stop" class="bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg px-3 py-1 text-xs font-bold select-none transition-all">停止</button>
          </div>

          <div class="flex items-center space-x-2 text-[10px] font-mono text-slate-400">
            <span id="current-time">0:00</span>
            <input type="range" id="seek-bar" value="0" min="0" max="100" class="w-24 accent-purple-500 cursor-pointer">
            <span id="duration-time">0:00</span>
          </div>
        </div>

        <!-- 非表示互換要素 -->
        <button id="btn-mute" class="hidden"></button>
        <button id="btn-record" class="hidden"></button>
        <select id="device-select" class="hidden"><option value=""></option></select>
      </section>

      <!-- ヒーローセクション 1: ボーカルピッチトラッカー Panel (キャンバス内直接描画方式) -->
      <section class="liquid-card p-3 relative overflow-hidden flex flex-col min-h-[260px]">
        <!-- キャンバス容器 -->
        <div class="flex-1 bg-black rounded-xl overflow-hidden border border-white/10 relative min-h-[240px]">
          <canvas id="canvas-pitch-tracker" class="w-full h-full block"></canvas>
          <canvas id="canvas-particles" class="w-full h-full block absolute top-0 left-0 pointer-events-none"></canvas>

          <!-- 音域設定ボタンなどの最小限UI (非同期要素) -->
          <div class="hidden">
            <span id="pitch-freq"></span><span id="pitch-note"></span>
            <span id="reg-chest"></span><span id="reg-mix"></span><span id="reg-head"></span>
            <span id="range-min"></span><span id="range-max"></span><span id="range-span"></span>
            <button id="btn-range-mode"></button><button id="btn-reset-range"></button><button id="btn-range-reset"></button>
          </div>
        </div>
      </section>

      <!-- ヒーローセクション 2: LOG HZ SPECTRUM (対数スペクトラム Panel) -->
      <section class="liquid-card p-3 relative overflow-hidden flex flex-col min-h-[200px]">
        <div class="flex-1 bg-black rounded-xl overflow-hidden border border-white/10 relative min-h-[180px]">
          <canvas id="canvas-spectrum" class="w-full h-full block"></canvas>
        </div>
      </section>

      <!-- ヒーローセクション 3: Companion Perspective (スペクトログラム Panel) -->
      <section class="liquid-card p-3 relative overflow-hidden flex flex-col min-h-[190px]">
        <div class="flex-1 bg-black rounded-xl overflow-hidden border border-white/10 relative min-h-[170px]">
          <canvas id="canvas-spectrogram" class="w-full h-full block"></canvas>
        </div>
      </section>

      <!-- 下部 3カラムグリッド: 3-Band Spectrum (復活), Vibrato Radar, Chord & Key Cards -->
      <section class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Card 1: 3-Band Spectrum -->
        <div class="liquid-card p-3 flex flex-col justify-between">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-wider block">3-Band Spectrum</span>
            <span class="text-[9px] text-slate-500 font-mono font-bold">Low / Mid / High</span>
          </div>
          <div class="h-28 bg-black rounded-xl border border-white/10 overflow-hidden relative">
            <canvas id="canvas-3band" class="w-full h-full block"></canvas>
          </div>
        </div>

        <!-- Card 2: Vibrato Detection Radar -->
        <div class="liquid-card p-3 flex flex-col justify-between">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-wider block">Vibrato Radar</span>
            <div id="vibrato-status" class="text-xs font-black text-slate-400 flex items-center space-x-1.5">
              <span id="vibrato-dot" class="w-2 h-2 rounded-full bg-slate-600 inline-block"></span>
              <span id="vibrato-text">OFF</span>
            </div>
          </div>
          
          <div class="flex items-center justify-between space-x-3">
            <div class="w-24 h-24 bg-black rounded-xl border border-white/10 overflow-hidden shrink-0">
              <canvas id="canvas-vibrato-radar" class="w-full h-full block"></canvas>
            </div>
            <div class="flex-1 text-right">
              <span class="text-[9px] font-bold text-slate-400 block uppercase">Frequency & Depth</span>
              <p id="vibrato-details" class="text-xs font-mono font-black text-purple-300">-- Hz / -- cents</p>
            </div>
          </div>
        </div>

        <!-- Card 3: Realtime Chord & Key -->
        <div class="liquid-card p-3 flex flex-col justify-between">
          <span class="text-[10px] font-black text-slate-300 uppercase tracking-wider mb-1.5 block">Realtime Chord & Key</span>
          <div class="bg-black/90 rounded-xl border border-white/10 p-3 flex flex-col items-center justify-center h-24 space-y-1">
            <div id="chord-display" class="text-3xl font-black font-mono text-purple-400 tracking-wider">--</div>
            <div id="key-display" class="text-xs font-black text-slate-300 font-mono">Key: --</div>
          </div>
        </div>

      </section>

    </main>
  </div>

  <!-- JavaScript ロジック -->
  <script src="renderer.js"></script>
</body>
</html>
